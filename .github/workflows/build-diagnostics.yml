name: Build diagnostics

on:
  push:
    branches: [build-evaluation]
  pull_request:
    branches: [main]

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Full workspace build diagnostic
        continue-on-error: true
        run: cargo build --workspace --all-features > full-build.log 2>&1
      - name: Embedded profile diagnostic
        continue-on-error: true
        run: cargo check --workspace --no-default-features --features embedded-profile > embedded-profile.log 2>&1
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: rust-build-diagnostics
          path: |
            full-build.log
            embedded-profile.log
          if-no-files-found: error
