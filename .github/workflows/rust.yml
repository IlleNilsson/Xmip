name: Rust

on:
  push:
    branches: [main, build-evaluation]
  pull_request:
    branches: [main]

jobs:
  workspace:
    name: Workspace evaluation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Download dependencies and refresh lockfile
        run: cargo fetch

      - name: Check formatting
        continue-on-error: true
        run: cargo fmt --all -- --check

      - name: Clippy
        continue-on-error: true
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Check workspace
        continue-on-error: true
        run: cargo check --workspace --all-targets --all-features

      - name: Test workspace
        continue-on-error: true
        run: cargo test --workspace --all-features

      - name: Build workspace
        run: cargo build --workspace --all-features

  profiles:
    name: Profile checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: IoT profile check
        continue-on-error: true
        run: cargo check --workspace --no-default-features --features iot-profile

      - name: Embedded profile check
        run: cargo check --workspace --no-default-features --features embedded-profile
